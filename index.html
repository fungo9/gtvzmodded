<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTVZ MODDED - Scripts GT</title>

<style>
:root {
    --bg-gradient-start: #0a2f0a;
    --bg-gradient-end: #031003;
    --card-bg: #0a1f0a;
    --card-border: #00ff0033;
    --text-primary: white;
    --text-secondary: #aaffaa;
    --neon-color: #00ff00;
    --neon-shadow: 0 0 10px #00ff00;
    --btn-gradient-start: #006400;
    --btn-gradient-end: #00aa00;
    --btn-hover-start: #008000;
    --btn-hover-end: #00ff00;
    --input-bg: #052005;
    --result-bg: #052005;
    --result-border: #00ff0033;
    --result-hover-border: #00ff00;
    --copy-btn-bg: linear-gradient(45deg, #006400, #00aa00);
    --raw-btn-bg: linear-gradient(45deg, #4a0080, #8000ff);
    --key-needed-bg: #8b0000;
    --key-free-bg: #006400;
    --bio-bg: #0a2f0a;
    --tab-active: #00ff00;
    --tab-inactive: #0a3a0a;
    --status-green: #00ff00;
    --status-orange: #ffaa00;
    --status-red: #ff3333;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: radial-gradient(circle at top, var(--bg-gradient-start), var(--bg-gradient-end));
color:var(--text-primary);
text-align:center;
overflow-x:hidden;
position:relative;
min-height:100vh;
}

/* Overlay de boas-vindas - cobre toda a tela com blur */
.welcome-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #0a2f0a, #020802);
    backdrop-filter: blur(12px);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: opacity 1.2s ease-out, backdrop-filter 1s ease;
    opacity: 1;
    pointer-events: none; /* Permite clicar através mas mantém visível */
}

/* Quando o overlay some */
.welcome-overlay.fade-out {
    opacity: 0;
    backdrop-filter: blur(0px);
    visibility: hidden;
}

/* Caixa da mensagem de digitação */
.welcome-message-box {
    background: rgba(0, 20, 0, 0.7);
    border: 2px solid var(--neon-color);
    border-radius: 40px;
    padding: 20px 40px;
    box-shadow: 0 0 80px var(--neon-color), inset 0 0 20px rgba(0,255,0,0.3);
    text-align: center;
    backdrop-filter: blur(4px);
    animation: pulseGlow 1.8s infinite alternate;
}

@keyframes pulseGlow {
    0% { box-shadow: 0 0 20px var(--neon-color), inset 0 0 10px rgba(0,255,0,0.2); }
    100% { box-shadow: 0 0 80px var(--neon-color), inset 0 0 30px rgba(0,255,0,0.6); }
}

.welcome-text {
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 4px;
    color: var(--neon-color);
    text-shadow: 0 0 15px var(--neon-color), 0 0 30px #00aa00;
    font-family: 'Courier New', monospace;
    white-space: nowrap;
    border-right: 4px solid var(--neon-color);
    display: inline-block;
    animation: blinkCursor 0.7s step-end infinite;
}

/* Cursor piscando */
@keyframes blinkCursor {
    0%, 100% { border-color: var(--neon-color); }
    50% { border-color: transparent; }
}

/* Para telas pequenas ajustar fonte */
@media (max-width: 600px) {
    .welcome-text {
        font-size: 28px;
        letter-spacing: 2px;
        white-space: nowrap;
    }
    .welcome-message-box {
        padding: 15px 25px;
    }
}

/* Conteúdo principal inicialmente com blur extra, depois volta ao normal */
.content {
    position: relative;
    z-index: 2;
    transition: filter 0.8s ease-out;
}

/* Quando o overlay está ativo, o conteúdo fica desfocado e um pouco escurecido */
body.blurred .content {
    filter: blur(8px) brightness(0.7);
    user-select: none;
    pointer-events: none;
}

/* Remove blur depois que a animação acaba */
body.blurred-remove .content {
    filter: blur(0px) brightness(1);
    pointer-events: auto;
}

.bubbles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
overflow:hidden;
}

.bubble{
position:absolute;
width:var(--size);
height:var(--size);
background:rgba(0, 255, 0, 0.1);
border-radius:50%;
border:1px solid rgba(0, 255, 0, 0.5);
box-shadow:0 0 15px var(--neon-color), 0 0 30px var(--neon-color);
animation:moveBubble var(--duration) linear infinite;
opacity:var(--opacity);
animation-delay:0s;
}

@keyframes moveBubble{
0%{
transform:translateX(-100px) translateY(var(--y-start));
opacity:0;
}
5%{
opacity:var(--opacity);
}
95%{
opacity:var(--opacity);
}
100%{
transform:translateX(calc(100vw + 100px)) translateY(var(--y-end));
opacity:0;
}
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 25px;
background:rgba(0,20,0,0.7);
backdrop-filter: blur(6px);
border-bottom:1px solid var(--neon-color);
position:relative;
z-index:3;
}

.logo{
font-size:28px;
font-weight:bold;
letter-spacing:2px;
animation: glow 2s infinite alternate;
text-shadow:0 0 10px var(--neon-color);
color:var(--neon-color);
}

@keyframes glow{
from{ text-shadow:0 0 5px var(--neon-color), 0 0 10px var(--neon-color);}
to{ text-shadow:0 0 20px var(--neon-color), 0 0 40px var(--neon-color);}
}

.menu{
font-size:28px;
cursor:pointer;
transition:0.3s;
color:var(--neon-color);
}

.menu:hover{
transform:scale(1.2);
color:var(--neon-color);
}

.menu-box{
display:none;
background:#051005;
padding:20px;
border:1px solid var(--neon-color);
position:relative;
z-index:3;
opacity:0;
transform:translateY(-20px);
transition:opacity 0.4s ease, transform 0.4s ease;
}

.menu-box.show{
display:block;
opacity:1;
transform:translateY(0);
}

.menu-box a{
display:block;
color:white;
text-decoration:none;
margin:12px;
font-size:18px;
transition:0.3s;
opacity:0;
transform:translateX(-10px);
animation:fadeInItem 0.4s ease forwards;
}

.menu-box a:nth-child(1){ animation-delay:0.1s; }
.menu-box a:nth-child(2){ animation-delay:0.2s; }
.menu-box a:nth-child(3){ animation-delay:0.3s; }

.menu-box a:hover{
color:var(--neon-color);
transform:translateX(6px) !important;
text-shadow:0 0 10px var(--neon-color);
}

.menu-divider{
width:100%;
height:3px;
background:linear-gradient(90deg, transparent, var(--neon-color), var(--neon-color), var(--neon-color), transparent);
margin:20px 0 15px 0;
box-shadow:0 0 25px var(--neon-color), 0 0 50px var(--neon-color);
border-radius:2px;
}

@keyframes fadeInItem{
0%{ opacity:0; transform:translateX(-10px); }
100%{ opacity:1; transform:translateX(0); }
}

.hero{
padding:70px 20px;
position:relative;
z-index:2;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
animation:floatText 3s ease-in-out infinite;
text-shadow:0 0 15px var(--neon-color);
color:var(--neon-color);
}

@keyframes floatText{
0%{ transform:translateY(0px); }
50%{ transform:translateY(-8px); }
100%{ transform:translateY(0px); }
}

.hero p{
opacity:0.9;
color:var(--text-secondary);
font-size:18px;
}

.canais-section{
margin-top:40px;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
width:100%;
}

.canais-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
width:90%;
max-width:800px;
margin:0 auto;
}

.canal-card{
flex:1;
min-width:250px;
max-width:350px;
background:var(--card-bg);
border:2px solid var(--card-border);
border-radius:20px;
padding:25px 20px;
box-shadow:0 0 30px var(--card-border);
cursor:pointer;
transition:0.3s;
}

.canal-card:hover{
transform:scale(1.05);
border-color:var(--neon-color);
box-shadow:0 0 50px var(--neon-color);
}

.canal-nome{
font-size:24px;
color:var(--neon-color);
margin-bottom:10px;
text-shadow:0 0 10px var(--neon-color);
}

.canal-sub{
font-size:16px;
color:var(--text-secondary);
opacity:0.9;
}

.separator{
width:80%;
max-width:600px;
height:2px;
background:linear-gradient(90deg, transparent, var(--neon-color), var(--neon-color), var(--neon-color), transparent);
margin:30px auto;
box-shadow:0 0 20px var(--neon-color);
}

.scripts-grid {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    margin: 30px 0;
    width: 100%;
}

footer {
    margin-top: 50px;
    opacity: 0.7;
    font-size: 14px;
    padding: 20px;
    border-top: 1px solid var(--card-border);
    color: var(--text-secondary);
    position: relative;
    z-index: 2;
}

/* ESTILO PARA O LAYOUT COM 3 ABAS LATERAIS */
.script-with-side-tabs {
    display: flex;
    gap: 20px;
    width: 90%;
    max-width: 900px;
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 30px var(--card-border);
    transition: 0.3s;
    margin: 0 auto 30px;
}

.script-with-side-tabs:hover {
    border-color: var(--neon-color);
    box-shadow: 0 0 40px var(--neon-color);
}

.side-tabs {
    width: 80px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.tab-btn {
    background: var(--tab-inactive);
    border: 1px solid var(--neon-color);
    border-radius: 12px;
    padding: 12px 5px;
    cursor: pointer;
    transition: 0.3s;
    text-align: center;
    font-size: 12px;
    font-weight: bold;
    color: var(--text-secondary);
}

.tab-btn:hover {
    background: var(--neon-color);
    color: #031003;
    transform: translateX(3px);
    box-shadow: 0 0 15px var(--neon-color);
}

.tab-btn.active {
    background: var(--neon-color);
    color: #031003;
    box-shadow: 0 0 20px var(--neon-color);
}

.tab-label {
    font-size: 11px;
    font-weight: bold;
}

.script-content-tab {
    flex: 1;
    min-width: 0;
}

.tab-pane {
    display: none;
}

.tab-pane.active {
    display: block;
}

.script-name-header {
    font-size: 24px;
    color: var(--neon-color);
    text-shadow: 0 0 10px var(--neon-color);
    margin-bottom: 15px;
    text-align: left;
    border-bottom: 1px solid var(--neon-color);
    padding-bottom: 8px;
}

.script-jogo {
    font-size: 14px;
    color: var(--text-secondary);
    background: rgba(0, 255, 0, 0.1);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--neon-color);
    display: inline-block;
    margin-bottom: 15px;
}

.script-image-tab {
    width: 100%;
    height: 180px;
    border-radius: 15px;
    border: 2px solid var(--neon-color);
    box-shadow: 0 0 30px var(--neon-color);
    background: linear-gradient(145deg, #0a3a0a, #052005);
    margin-bottom: 20px;
    overflow: hidden;
}

.script-image-tab img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.script-code-area {
    background: #052005;
    border-radius: 12px;
    border: 1px solid var(--card-border);
    padding: 15px;
    margin-top: 10px;
}

.script-code-text {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    text-align: left;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 150px;
    overflow-y: auto;
    line-height: 1.5;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: none;
    background: #031003;
    padding: 12px;
    border-radius: 8px;
}

.script-code-text::-webkit-scrollbar {
    width: 6px;
}

.script-code-text::-webkit-scrollbar-track {
    background: #0a1f0a;
}

.script-code-text::-webkit-scrollbar-thumb {
    background: var(--neon-color);
    border-radius: 3px;
}

.copy-code-btn {
    padding: 10px 24px;
    background: linear-gradient(45deg, #006400, #00aa00);
    border: 2px solid #000000;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 0 10px var(--neon-color);
    margin-top: 15px;
    width: auto;
}

.copy-code-btn:hover {
    transform: scale(1.02);
    box-shadow: 0 0 20px var(--neon-color);
}

.info-card {
    background: #052005;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    border: 1px solid var(--neon-color);
}

.key-info {
    font-size: 48px;
    margin-bottom: 15px;
}

.key-badge {
    display: inline-block;
    padding: 8px 25px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: bold;
}

.key-badge.key-needed {
    background: #8b0000;
    color: #ffcccc;
    border: 2px solid #ff4444;
}

.key-badge.key-free {
    background: #006400;
    color: #ccffcc;
    border: 2px solid #00ff00;
}

.key-description {
    margin-top: 15px;
    color: var(--text-secondary);
    font-size: 14px;
}

.status-badge {
    display: inline-block;
    padding: 8px 25px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: bold;
}

.status-badge.green {
    background: #005000;
    color: #00ff00;
    border: 2px solid #00ff00;
}

.status-badge.orange {
    background: #553300;
    color: #ffaa00;
    border: 2px solid #ffaa00;
}

.status-badge.red {
    background: #550000;
    color: #ff5555;
    border: 2px solid #ff5555;
}

.status-description {
    margin-top: 15px;
    color: var(--text-secondary);
    font-size: 14px;
}

.script-bio-tab {
    background: var(--bio-bg);
    border: 1px solid var(--neon-color);
    border-radius: 12px;
    padding: 12px 15px;
    margin-bottom: 15px;
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
}

@media (max-width: 700px) {
    .script-with-side-tabs {
        flex-direction: column;
    }
    .side-tabs {
        width: 100%;
        flex-direction: row;
        justify-content: center;
    }
    .tab-btn {
        flex: 1;
    }
}
</style>
</head>

function getStatusInfo(scriptNome) {
    const config = scriptStatusConfig[scriptNome];
    if (config) return config;
    return { status: "green", text: "ATUALIZADO", desc: "" };
}

let scriptsLoaded = false;

function loadScripts() {
    if(scriptsLoaded) return;
    scriptsLoaded = true;
    const container = document.getElementById('scriptsContainer');
    container.innerHTML = '';
    
    scriptsData.forEach((script, index) => {
        const imagemValida = script.imagem && script.imagem !== "" ? script.imagem : "https://i.postimg.cc/Znfb3tPf/file-0000000025f071f598654ef7618e92aa.png";
        const statusKey = keyConfigPorScript[script.nome] || "SEM CHAVE";
        const keyClass = statusKey === "CHAVE" ? "key-needed" : "key-free";
        const keyText = statusKey === "CHAVE" ? ptTexts.withKey : ptTexts.withoutKey;
        const isKeyNeeded = statusKey === "CHAVE";
        
        const statusInfo = getStatusInfo(script.nome);
        let statusClass = '';
        let statusDisplayText = '';
        if (statusInfo.status === 'green') {
            statusClass = 'green';
            statusDisplayText = ptTexts.statusUpdated;
        } else if (statusInfo.status === 'red') {
            statusClass = 'red';
            statusDisplayText = ptTexts.statusOutdated;
        } else if (statusInfo.status === 'orange') {
            statusClass = 'orange';
            statusDisplayText = ptTexts.statusMaintenance;
        } else {
            statusClass = 'green';
            statusDisplayText = ptTexts.statusUpdated;
        }
        
        let bioHtml = '';
        if (script.bio) {
            bioHtml = `<div class="script-bio-tab"><span>📢 INFO:</span> ${script.bio}</div>`;
        }
        
        const scriptCard = document.createElement('div');
        scriptCard.className = 'script-with-side-tabs';
        scriptCard.innerHTML = `
            <div class="side-tabs">
                <div class="tab-btn active" onclick="switchTab(${index}, 'script')">
                    <span class="tab-label">${ptTexts.tabScript}</span>
                </div>
                <div class="tab-btn" onclick="switchTab(${index}, 'key')">
                    <span class="tab-label">${ptTexts.tabKey}</span>
                </div>
                <div class="tab-btn" onclick="switchTab(${index}, 'status')">
                    <span class="tab-label">${ptTexts.tabStatus}</span>
                </div>
            </div>
            <div class="script-content-tab">
                <div class="tab-pane active" id="scriptPane${index}">
                    <div class="script-name-header">${script.nome}</div>
                    <div class="script-jogo">${script.jogo}</div>
                    <div class="script-image-tab">
                        <img src="${imagemValida}" alt="${script.nome}" onerror="this.src='https://i.postimg.cc/Znfb3tPf/file-0000000025f071f598654ef7618e92aa.png'">
                    </div>
                    ${bioHtml}
                    <div class="script-code-area">
                        <div class="script-code-text" id="scriptText${index}">${script.script}</div>
                        <button class="copy-code-btn" onclick="copyScriptWithTab(${index})" id="copyBtn${index}">${ptTexts.copyText}</button>
                    </div>
                </div>
                <div class="tab-pane" id="keyPane${index}">
                    <div class="script-name-header">${ptTexts.keyInfo}</div>
                    <div class="info-card">
                        <div class="key-info">${isKeyNeeded ? '🔒' : '🔓'}</div>
                        <div class="key-badge ${keyClass}">${keyText}</div>
                        <div class="key-description">${isKeyNeeded ? ptTexts.keyDesc : ptTexts.noKeyDesc}</div>
                    </div>
                </div>
                <div class="tab-pane" id="statusPane${index}">
                    <div class="script-name-header">${ptTexts.statusInfo}</div>
                    <div class="info-card">
                        <div class="status-badge ${statusClass}">${statusDisplayText}</div>
                        <div class="status-description">${statusInfo.desc}</div>
                    </div>
                </div>
            </div>
        `;
        container.appendChild(scriptCard);
    });
}

function switchTab(scriptIndex, tabName) {
    const scriptCard = document.querySelectorAll('.script-with-side-tabs')[scriptIndex];
    if(!scriptCard) return;
    
    const panes = ['script', 'key', 'status'];
    panes.forEach(pane => {
        const paneElement = document.getElementById(`${pane}Pane${scriptIndex}`);
        if(paneElement) paneElement.classList.remove('active');
    });
    
    const activePane = document.getElementById(`${tabName}Pane${scriptIndex}`);
    if(activePane) activePane.classList.add('active');
    
    const tabs = scriptCard.querySelectorAll('.tab-btn');
    tabs.forEach(tab => tab.classList.remove('active'));
    
    const activeTab = scriptCard.querySelectorAll('.tab-btn')[panes.indexOf(tabName)];
    if(activeTab) activeTab.classList.add('active');
}

function copyScriptWithTab(index) {
    const scriptText = document.getElementById(`scriptText${index}`);
    const textToCopy = scriptText.innerText;
    const textArea = document.createElement('textarea');
    textArea.value = textToCopy;
    textArea.style.position = 'fixed';
    textArea.style.left = '-9999px';
    document.body.appendChild(textArea);
    textArea.select();
    document.execCommand('copy');
    document.body.removeChild(textArea);
    const btn = document.getElementById(`copyBtn${index}`);
    const originalText = btn.innerHTML;
    btn.innerHTML = ptTexts.copiedText;
    setTimeout(() => {
        btn.innerHTML = originalText;
    }, 2000);
}

function toggleMenu() {
    let menu = document.getElementById("menu")
    if(menu.classList.contains("show")){
        menu.classList.remove("show");
        setTimeout(() => { if(!menu.classList.contains("show")) menu.style.display = "none"; }, 400);
    }else{
        menu.style.display = "block";
        setTimeout(() => menu.classList.add("show"), 10);
    }
}

function criarBubbles() {
    const bubblesContainer = document.getElementById('bubbles');
    const numeroBubbles = 25;
    for(let i = 0; i < numeroBubbles; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const size = 5 + Math.random() * 35;
        bubble.style.setProperty('--size', size + 'px');
        const yStart = (Math.random() * 20 - 10) + 'vh';
        const yEnd = (Math.random() * 20 - 10) + 'vh';
        bubble.style.setProperty('--y-start', yStart);
        bubble.style.setProperty('--y-end', yEnd);
        bubble.style.left = '0';
        bubble.style.top = (Math.random() * 100) + '%';
        const duration = 6 + Math.random() * 12;
        bubble.style.setProperty('--duration', duration + 's');
        const opacity = 0.15 + Math.random() * 0.5;
        bubble.style.setProperty('--opacity', opacity);
        if (i % 4 === 0) {
            bubble.style.left = 'auto';
            bubble.style.right = '0';
            bubble.style.animation = 'moveBubbleReverse var(--duration) linear infinite';
            if (!document.getElementById('reverseStyle')) {
                const styleSheet = document.createElement("style");
                styleSheet.id = 'reverseStyle';
                styleSheet.textContent = `
                    @keyframes moveBubbleReverse{
                        0%{ transform:translateX(100px) translateY(var(--y-start)); opacity:0; }
                        5%{ opacity:var(--opacity); }
                        95%{ opacity:var(--opacity); }
                        100%{ transform:translateX(calc(-100vw - 100px)) translateY(var(--y-end)); opacity:0; }
                    }
                `;
                document.head.appendChild(styleSheet);
            }
        }
        bubblesContainer.appendChild(bubble);
    }
}

            index++;
            setTimeout(typeWriter, 120); // Velocidade da digitação
        } else {
            // Quando terminar de escrever, espera 0.8s e depois dá fade-out no overlay e remove blur
            setTimeout(() => {
                overlay.classList.add('fade-out');
                document.body.classList.remove('blurred');
                document.body.classList.add('blurred-remove');
                // Remove o overlay após a transição para liberar interação
                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.body.classList.remove('blurred-remove');
                }, 1000);
            }, 800);
        }
    }
    
    // Inicia a animação de digitação
    typeWriter();
}

// Iniciar tudo após carregamento
window.onload = function() {
    criarBubbles();
    loadScripts();
    iniciarAnimacaoBoasVindas();
};
</script>
