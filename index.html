<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTVZ HUB - Scripts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0ffe0;
            min-height: 100vh;
            background: #0a0e0a;
            overflow-x: hidden;
        }

        /* Fundo otimizado - usando canvas-like com gradientes simples */
        .fundo-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 30% 40%, rgba(0, 255, 65, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(0, 200, 50, 0.08) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 180, 40, 0.06) 0%, transparent 40%),
                linear-gradient(180deg, #0a0e0a 0%, #0a1a0a 60%, #0a0e0a 100%);
            animation: fundoMovimento 10s ease-in-out infinite alternate;
            will-change: background-position;
        }

        /* Manchas simplificadas - sem blur pesado */
        .manchas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(circle at 25% 35%, rgba(0, 255, 65, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 75% 65%, rgba(0, 200, 50, 0.10) 0%, transparent 30%),
                radial-gradient(circle at 50% 25%, rgba(0, 180, 40, 0.08) 0%, transparent 25%);
            animation: manchasMovimento 15s ease-in-out infinite alternate;
            will-change: transform;
            pointer-events: none;
        }

        @keyframes fundoMovimento {
            0% {
                background-position: 0% 0%, 0% 0%, 0% 0%;
            }
            100% {
                background-position: 20% 10%, 30% 20%, 10% 30%;
            }
        }

        @keyframes manchasMovimento {
            0% {
                transform: scale(1) translate(0, 0);
            }
            100% {
                transform: scale(1.08) translate(3%, 2%);
            }
        }

        /* Overlay escuro */
        .fundo-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: rgba(5, 10, 5, 0.5);
            pointer-events: none;
        }

        /* LOADER */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loader.hide {
            opacity: 0;
            visibility: hidden;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid #1a3a1a;
            border-top: 3px solid #00ff41;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* CONTEÚDO */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 2;
        }

        /* LOGO REDONDA */
        .logo-circle {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .logo-circle img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #00ff41;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.2);
            object-fit: cover;
        }

        /* CANAIS */
        .channels-section {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 0 0 35px 0;
            width: 100%;
        }

        .channel-card {
            flex: 1;
            min-width: 140px;
            padding: 15px 18px;
            border-radius: 12px;
            border: 1px solid #1a3a1a;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            background: rgba(10, 18, 10, 0.7);
            backdrop-filter: blur(5px);
        }

        .channel-card:hover {
            border-color: #00ff41;
            transform: translateY(-2px);
            background: rgba(10, 25, 10, 0.8);
        }

        .channel-card .name {
            color: #00ff41;
            font-weight: 600;
            font-size: 15px;
        }

        .channel-card .sub {
            font-size: 11px;
            color: #7dff7d;
            opacity: 0.4;
            margin-top: 4px;
        }

        /* SCRIPTS */
        .scripts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-top: 20px;
        }

        .script-card {
            background: rgba(17, 26, 17, 0.75);
            border-radius: 15px;
            border: 1px solid #1a3a1a;
            overflow: hidden;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(8px);
        }

        .script-card:hover {
            border-color: #00ff4166;
        }

        .script-card .card-header {
            padding: 15px 18px 10px;
            border-bottom: 1px solid #1a3a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .script-card .card-header .title {
            font-size: 18px;
            font-weight: 700;
            color: #00ff41;
        }

        .script-card .card-header .game-tag {
            font-size: 11px;
            background: rgba(10, 31, 10, 0.7);
            padding: 3px 12px;
            border-radius: 20px;
            border: 1px solid #1a3a1a;
            color: #7dff7d;
        }

        .script-card .card-body {
            padding: 14px 18px 18px;
        }

        /* LAYOUT COM ABAS */
        .script-with-tabs {
            display: flex;
            gap: 12px;
        }

        .side-tabs {
            width: 60px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tab-btn {
            background: rgba(10, 26, 10, 0.6);
            border: 1px solid #1a3a1a;
            border-radius: 8px;
            padding: 8px 4px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: #7dff7d;
        }

        .tab-btn:hover {
            background: rgba(0, 255, 65, 0.08);
            border-color: #00ff4166;
        }

        .tab-btn.active {
            background: rgba(0, 255, 65, 0.12);
            border-color: #00ff41;
            color: #00ff41;
        }

        .tab-label {
            font-size: 9px;
            font-weight: 700;
        }

        .tab-content {
            flex: 1;
            min-width: 0;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        .script-img {
            width: 100%;
            height: 150px;
            background: rgba(10, 18, 10, 0.6);
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #1a3a1a;
        }

        .script-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bio-text {
            font-size: 12px;
            color: #7dff7d;
            opacity: 0.8;
            background: rgba(10, 21, 10, 0.5);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 3px solid #00ff41;
            line-height: 1.5;
        }

        .code-area {
            background: rgba(10, 18, 10, 0.5);
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid #1a3a1a;
        }

        .code-text {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #7dff7d;
            max-height: 100px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
            user-select: none;
            pointer-events: none;
            opacity: 0.85;
        }

        .code-text::-webkit-scrollbar {
            width: 3px;
        }

        .code-text::-webkit-scrollbar-track {
            background: #0a120a;
        }

        .code-text::-webkit-scrollbar-thumb {
            background: #00ff4133;
            border-radius: 3px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 7px 16px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 70px;
        }

        .btn-copy {
            background: linear-gradient(135deg, #006400, #00aa00);
            color: #fff;
        }

        .btn-copy:hover {
            transform: scale(1.02);
        }

        .btn-download {
            background: linear-gradient(135deg, #1a1a6a, #4444cc);
            color: #fff;
        }

        .btn-download:hover {
            transform: scale(1.02);
        }

        /* INFO CARDS */
        .info-card {
            background: rgba(10, 21, 10, 0.5);
            border-radius: 10px;
            padding: 20px 16px;
            text-align: center;
            border: 1px solid #1a3a1a;
            margin-top: 8px;
        }

        .info-card .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .info-card .badge-status {
            display: inline-block;
            padding: 6px 24px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 700;
        }

        .badge-status.key-needed {
            background: #440000;
            color: #ff4444;
            border: 2px solid #ff4444;
        }

        .badge-status.key-free {
            background: #004400;
            color: #00ff41;
            border: 2px solid #00ff41;
        }

        .info-card .desc {
            margin-top: 12px;
            color: #7dff7d;
            opacity: 0.6;
            font-size: 13px;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 25px 20px;
            border-top: 1px solid #1a3a1a;
            margin-top: 35px;
            color: #7dff7d;
            opacity: 0.4;
            font-size: 12px;
            position: relative;
            z-index: 2;
        }

        footer span {
            color: #00ff41;
        }

        @media (max-width: 700px) {
            .script-with-tabs {
                flex-direction: column;
            }
            .side-tabs {
                width: 100%;
                flex-direction: row;
                justify-content: center;
            }
            .tab-btn {
                flex: 1;
                padding: 6px 4px;
            }
            .channels-section {
                flex-direction: column;
            }
            .channel-card {
                flex: none;
                width: 100%;
            }
        }
    </style>
</head>

        // ============================================
        // FUNÇÃO PARA PEGAR CONFIGURAÇÃO DE KEY
        // ============================================
        function getKeyConfig(scriptNome) {
            return keyConfigPorScript[scriptNome] || false;
        }

        // ============================================
        // FUNÇÕES
        // ============================================

        function abrirCanal1() {
            window.open("https://youtube.com/@gtvzmodded-7?si=NLtaOGasGcr6qSR3", "_blank");
        }

        function abrirCanal2() {
            window.open("https://youtube.com/@gtxteam_psicopata?si=X2dOSofWDqWL6-yG", "_blank");
        }

        function copiarScript(index) {
            const text = document.getElementById(`codeText${index}`).innerText;
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            const btn = document.getElementById(`copyBtn${index}`);
            const original = btn.innerText;
            btn.innerText = '✅COPIADO';
            setTimeout(() => btn.innerText = original, 2000);
        }

        function baixarScript(nome, index) {
            const text = document.getElementById(`codeText${index}`).innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = nome.replace(/ /g, '_') + '.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            const btn = document.getElementById(`downloadBtn${index}`);
            const original = btn.innerText;
            btn.innerText = '⬇ BAIXADO!';
            setTimeout(() => btn.innerText = original, 2000);
        }

        function switchTab(index, tab) {
            const panes = ['script', 'key'];
            panes.forEach(p => {
                const el = document.getElementById(`${p}Pane${index}`);
                if (el) el.classList.remove('active');
            });

            const activePane = document.getElementById(`${tab}Pane${index}`);
            if (activePane) activePane.classList.add('active');

            const tabs = document.querySelectorAll(`#tabs${index} .tab-btn`);
            tabs.forEach((btn, i) => {
                btn.classList.remove('active');
                if (panes[i] === tab) btn.classList.add('active');
            });
        }

                card.innerHTML = `

                                    </div>
                                    <div class="card-actions">
                                        <button class="btn btn-copy" id="copyBtn${index}" onclick="copiarScript(${index})">COPIAR</button>
                                        <button class="btn btn-download" id="downloadBtn${index}" onclick="baixarScript('${script.nome}', ${index})">⬇BAIXAR</button>
                                    </div>
                                </div>
                                <!-- ABA CHAVE -->
                                <div class="tab-pane" id="keyPane${index}">
                                    <div class="info-card">
                                        <div class="icon">${keyIcon}</div>
                                        <div class="badge-status ${keyClass}">${keyLabel}</div>
                                        <div class="desc">${keyDesc}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ============================================
        // INICIALIZAÇÃO
        // ============================================

        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hide');
            }, 800);
            carregarScripts();
        });
    </script>
</body>
</html>
